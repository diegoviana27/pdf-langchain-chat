services:
  pgvector:
    image: pgvector/pgvector:pg16
    container_name: pgvector_db
    environment:
      POSTGRES_USER: langchain
      POSTGRES_PASSWORD: langchain
      POSTGRES_DB: langchain_db
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - pgvector_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langchain -d langchain_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgvector_data:
